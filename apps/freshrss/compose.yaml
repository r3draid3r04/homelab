x-arcane:
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/freshrss.png
  urls:
    - https://freshrss.org/
    - https://github.com/FreshRSS/FreshRSS

services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ${APPDATA_PATH}/freshrss/data:/var/www/FreshRSS/data
      - ${APPDATA_PATH}/extensions:/var/www/FreshRSS/extensions
    restart: unless-stopped
    networks:
      cn1: null
    labels:
      - com.getarcaneapp.arcane.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/freshrss.png
      - traefik.enable=true
      - traefik.http.routers.freshrss-rtr.tls=true
      - traefik.http.routers.freshrss-rtr.rule=Host(`${HOSTNAME}`)
      - traefik.http.routers.freshrss-rtr.entrypoints=https
      - traefik.http.services.freshrss-svc.loadbalancer.server.port=80
networks:
  cn1:
    external: true